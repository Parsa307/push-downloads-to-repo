name: Push Release to Repo

on:
  workflow_dispatch:

jobs:
  push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure Git
        run: |
          git config --global user.email "parsastdev@duck.com"
          git config --global user.name "Parsast"

      - name: Push Release to Repo
        run: |
          aria2c https://github.com/therealaleph/MasterHttpRelayVPN-RUST/releases/download/v1.2.1/mhrv-rs-android-universal-v1.2.1.apk
          git add -A
          git commit -m "push release to repo"
          git push -u origin main
